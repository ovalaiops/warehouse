version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/api/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://warehouse:warehouse_dev@postgres:5432/warehouse?sslmode=disable"
      FIREBASE_PROJECT_ID: "warehouse-intel"
      INFERENCE_URL: "http://inference:8090"
      CLOUD_STORAGE_BUCKET: "warehouse-intel-media"
    depends_on:
      - postgres
      - redis

  inference:
    build:
      context: ./backend/inference
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      MODEL_2B_PATH: "nvidia/Cosmos-Reason2-2B"
      MODEL_8B_PATH: "nvidia/Cosmos-Reason2-8B"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  pgdata:
