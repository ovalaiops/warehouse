name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-web:
    name: Frontend Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontendweb
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontendweb/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  frontend-mobile:
    name: Frontend Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontendmobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontendmobile/package-lock.json
      - run: npm ci
      - run: npx expo export --platform web

  backend-go:
    name: Backend Go API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -v

  backend-python:
    name: Backend Python Inference
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/inference
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m py_compile app/main.py
